name: Obfuscate and Commit

on:
    push:
        paths:
            - '明文源码.js'
    workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install -g javascript-obfuscator

      - name: Obfuscate code
        run: |
           javascript-obfuscator 明文源码.js --output _worker.js \
           --compact true \  # 压缩
           --identifier-names-generator hexadecimal \   # 使用特定规则（如十六进制）重命名变量和函数
           --rename-globals true \   # 重命名全局变量和函数
           # --string-array true \   # 将字符串转换为数组
           # --string-array-threshold 1 \   # 设置需要转换为数组的字符串比例
           --unicode-escape-sequence true    # 将字符串转换为 Unicode 转义序列


      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _worker.js
          git commit -m "Obfuscate _worker.js" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
